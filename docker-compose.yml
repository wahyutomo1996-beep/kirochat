version: '3.8'

services:
  kirochat:
    build: .
    container_name: kirochat
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/kirochat.db
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - NEXT_PUBLIC_APP_NAME=KiroChat
    volumes:
      - kirochat-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kirochat-data:
    driver: local
